{% extends "base.html" %}

{% block meta %}
<meta name="author" content="{{ page.author.name }}" />
<meta name="description" content="{{ page.summary|default(SITEDESCRIPTION)|striptags|escape }}" />
{% include "partial/og.html" %}
{% endblock %}

{% block title %} – {{ page.title|striptags|escape }}{% endblock %}

{% block content %}
<div class="article-hero">
  <div class="article-hero__inner">
    <h1 class="article-hero__title">{{ page.title }}</h1>
  </div>
</div>

<div class="article-body">
  {{ page.content }}
</div>
{% endblock %}

<svg width="720" height="400" viewBox="0 0 720 400" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">

  <rect width="720" height="400" fill="#fafaf9" rx="12"/>

  <!-- Title -->
  <text x="360" y="30" text-anchor="middle" font-size="14" font-weight="600" fill="#1c1c1a">Cache reads per turn — session 024f6a11 (2h 57m, 230 turns)</text>
  <text x="360" y="48" text-anchor="middle" font-size="11" fill="#73726c">354 total input tokens across 230 turns — the session ran almost entirely off cache</text>

  <!-- Chart area: x=70..670, y=70..320 -->

  <!-- Y axis gridlines + labels (0, 50K, 100K, 150K, 200K, 250K) -->
  <line x1="70" y1="70" x2="70" y2="320" stroke="#d3d1c7" stroke-width="1"/>
  <line x1="70" y1="320" x2="670" y2="320" stroke="#d3d1c7" stroke-width="1"/>

  <line x1="70" y1="270" x2="670" y2="270" stroke="#e8e6df" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="70" y1="220" x2="670" y2="220" stroke="#e8e6df" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="70" y1="170" x2="670" y2="170" stroke="#e8e6df" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="70" y1="120" x2="670" y2="120" stroke="#e8e6df" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="70" y1="70" x2="670" y2="70" stroke="#e8e6df" stroke-width="1" stroke-dasharray="3 3"/>

  <text x="62" y="324" text-anchor="end" font-size="10" fill="#73726c">0</text>
  <text x="62" y="274" text-anchor="end" font-size="10" fill="#73726c">50K</text>
  <text x="62" y="224" text-anchor="end" font-size="10" fill="#73726c">100K</text>
  <text x="62" y="174" text-anchor="end" font-size="10" fill="#73726c">150K</text>
  <text x="62" y="124" text-anchor="end" font-size="10" fill="#73726c">200K</text>
  <text x="62" y="74" text-anchor="end" font-size="10" fill="#73726c">250K</text>

  <text x="16" y="200" text-anchor="middle" font-size="11" fill="#73726c" transform="rotate(-90 16 200)">Tokens per turn (cache reads)</text>

  <!-- Data points: turns 10,25,50,80,100,150,200,230 -->
  <!-- reads:      25467,37255,60399,0,96282,149760,191541,220821 -->
  <!-- x: turn/230*600+70. turn 10→96, 25→135, 50→200, 80→278, 100→330, 150→461, 200→591, 230→670 -->
  <!-- y: val/250000*250 subtracted from 320. 25467→294, 37255→283, 60399→259, 0→320, 96282→224, 149760→170, 191541→129, 220821→100 -->

  <!-- Shaded region: before the wipe -->
  <path d="M96,294 C116,289 155,274 200,259 L200,320 L96,320 Z" fill="#534AB7" opacity="0.08"/>

  <!-- Shaded region: after the wipe (recovery) -->
  <path d="M278,320 L330,224 C395,196 428,183 461,170 C526,143 558,136 591,129 C621,122 645,110 670,100 L670,320 Z" fill="#534AB7" opacity="0.08"/>

  <!-- Line segment 1: turns 10 → 50 (before wipe) -->
  <polyline points="96,294 135,283 200,259" fill="none" stroke="#534AB7" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Drop line to 0 at turn 80 -->
  <line x1="200" y1="259" x2="278" y2="320" stroke="#dc2626" stroke-width="2" stroke-dasharray="5 3"/>

  <!-- Line segment 2: turns 100 → 230 (after wipe) -->
  <polyline points="330,224 461,170 591,129 670,100" fill="none" stroke="#534AB7" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Gap line from turn 80 to turn 100 (recovery) -->
  <line x1="278" y1="320" x2="330" y2="224" stroke="#534AB7" stroke-width="2" stroke-dasharray="3 3" opacity="0.5"/>

  <!-- Expansion event lines: turns 1→72, 37→167, 80→278, 116→372, 221→647 -->
  <line x1="72" y1="320" x2="72" y2="70" stroke="#ea580c" stroke-width="0.75" stroke-dasharray="2 3" opacity="0.35"/>
  <line x1="167" y1="320" x2="167" y2="70" stroke="#ea580c" stroke-width="0.75" stroke-dasharray="2 3" opacity="0.35"/>
  <line x1="372" y1="320" x2="372" y2="70" stroke="#ea580c" stroke-width="0.75" stroke-dasharray="2 3" opacity="0.35"/>
  <line x1="647" y1="320" x2="647" y2="70" stroke="#ea580c" stroke-width="0.75" stroke-dasharray="2 3" opacity="0.35"/>

  <!-- Turn 80 vertical highlighted line -->
  <line x1="278" y1="70" x2="278" y2="320" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.6"/>

  <!-- Data point dots -->
  <circle cx="96" cy="294" r="5" fill="#534AB7" stroke="#fafaf9" stroke-width="2"/>
  <circle cx="135" cy="283" r="5" fill="#534AB7" stroke="#fafaf9" stroke-width="2"/>
  <circle cx="200" cy="259" r="5" fill="#534AB7" stroke="#fafaf9" stroke-width="2"/>
  <!-- Turn 80: zero dot in red -->
  <circle cx="278" cy="320" r="7" fill="#dc2626" stroke="#fafaf9" stroke-width="2"/>
  <text x="278" y="319" text-anchor="middle" font-size="9" font-weight="700" fill="white">0</text>
  <circle cx="330" cy="224" r="5" fill="#534AB7" stroke="#fafaf9" stroke-width="2"/>
  <circle cx="461" cy="170" r="5" fill="#534AB7" stroke="#fafaf9" stroke-width="2"/>
  <circle cx="591" cy="129" r="5" fill="#534AB7" stroke="#fafaf9" stroke-width="2"/>
  <circle cx="670" cy="100" r="5" fill="#534AB7" stroke="#fafaf9" stroke-width="2"/>

  <!-- X axis labels -->
  <text x="96" y="336" text-anchor="middle" font-size="10" fill="#73726c">10</text>
  <text x="135" y="336" text-anchor="middle" font-size="10" fill="#73726c">25</text>
  <text x="200" y="336" text-anchor="middle" font-size="10" fill="#73726c">50</text>
  <text x="278" y="336" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">80</text>
  <text x="330" y="336" text-anchor="middle" font-size="10" fill="#73726c">100</text>
  <text x="461" y="336" text-anchor="middle" font-size="10" fill="#73726c">150</text>
  <text x="591" y="336" text-anchor="middle" font-size="10" fill="#73726c">200</text>
  <text x="670" y="336" text-anchor="middle" font-size="10" fill="#73726c">230</text>
  <text x="370" y="352" text-anchor="middle" font-size="11" fill="#73726c">Turn number</text>

  <!-- Callout: /clear event -->
  <rect x="290" y="108" width="188" height="52" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="384" y="124" text-anchor="middle" font-size="10" font-weight="600" fill="#7f1d1d">/clear triggered at turn 80</text>
  <text x="384" y="139" text-anchor="middle" font-size="10" fill="#991b1b">cache_read = 0, cache_write = 82K</text>
  <text x="384" y="153" text-anchor="middle" font-size="10" fill="#991b1b">full context rebuilt from scratch</text>
  <line x1="290" y1="130" x2="278" y2="130" stroke="#dc2626" stroke-width="1" marker-end="url(#arr3)"/>

  <!-- Callout: recovery steeper -->
  <rect x="480" y="82" width="166" height="38" rx="6" fill="#eef2ff" stroke="#4f46e5" stroke-width="1"/>
  <text x="563" y="97" text-anchor="middle" font-size="10" font-weight="600" fill="#312e81">Steeper ramp after reset</text>
  <text x="563" y="112" text-anchor="middle" font-size="10" fill="#3730a3">94% overall efficiency</text>
  <line x1="480" y1="100" x2="470" y2="130" stroke="#4f46e5" stroke-width="1" marker-end="url(#arr4)"/>

  <!-- Legend -->
  <line x1="84" y1="372" x2="104" y2="372" stroke="#534AB7" stroke-width="2.5"/>
  <circle cx="94" cy="372" r="4" fill="#534AB7" stroke="#fafaf9" stroke-width="1.5"/>
  <text x="110" y="376" font-size="10" fill="#73726c">Cache reads/turn</text>
  <circle cx="234" cy="372" r="6" fill="#dc2626" stroke="#fafaf9" stroke-width="1.5"/>
  <text x="246" y="376" font-size="10" fill="#73726c">/clear event (full context wipe)</text>
  <line x1="420" y1="372" x2="440" y2="372" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="2 3" opacity="0.7"/>
  <text x="446" y="376" font-size="10" fill="#73726c">Context expansion event</text>

  <defs>
    <marker id="arr3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr4" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#4f46e5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

</svg>

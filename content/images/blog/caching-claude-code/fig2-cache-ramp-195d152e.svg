<svg width="720" height="400" viewBox="0 0 720 400" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">

  <rect width="720" height="400" fill="#fafaf9" rx="12"/>

  <!-- Title -->
  <text x="360" y="30" text-anchor="middle" font-size="14" font-weight="600" fill="#1c1c1a">Cache reads per turn — session 195d152e (7h 50m, 387 turns)</text>
  <text x="360" y="48" text-anchor="middle" font-size="11" fill="#73726c">Orange dots = context expansion events (Claude reading a new file into the cache)</text>

  <!-- Chart area: x=70..670, y=70..320 -->

  <!-- Y axis gridlines + labels -->
  <!-- 0, 50K, 100K, 150K, 200K, 250K -->
  <!-- y=320 = 0, y=270 = 50K, y=220 = 100K, y=170 = 150K, y=120 = 200K, y=70 = 250K -->

  <line x1="70" y1="70" x2="70" y2="320" stroke="#d3d1c7" stroke-width="1"/>
  <line x1="70" y1="320" x2="670" y2="320" stroke="#d3d1c7" stroke-width="1"/>

  <!-- Gridlines -->
  <line x1="70" y1="270" x2="670" y2="270" stroke="#e8e6df" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="70" y1="220" x2="670" y2="220" stroke="#e8e6df" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="70" y1="170" x2="670" y2="170" stroke="#e8e6df" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="70" y1="120" x2="670" y2="120" stroke="#e8e6df" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="70" y1="70" x2="670" y2="70" stroke="#e8e6df" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- Y labels -->
  <text x="62" y="324" text-anchor="end" font-size="10" fill="#73726c">0</text>
  <text x="62" y="274" text-anchor="end" font-size="10" fill="#73726c">50K</text>
  <text x="62" y="224" text-anchor="end" font-size="10" fill="#73726c">100K</text>
  <text x="62" y="174" text-anchor="end" font-size="10" fill="#73726c">150K</text>
  <text x="62" y="124" text-anchor="end" font-size="10" fill="#73726c">200K</text>
  <text x="62" y="74" text-anchor="end" font-size="10" fill="#73726c">250K</text>

  <!-- Y axis title -->
  <text x="16" y="200" text-anchor="middle" font-size="11" fill="#73726c" transform="rotate(-90 16 200)">Tokens per turn (cache reads)</text>

  <!-- Data points: turns mapped to x, values mapped to y -->
  <!-- x range: turn 0..387 → x=70..670 (600px span). x = 70 + (turn/387)*600 -->
  <!-- y range: 0..250000 → y=320..70 (250px span). y = 320 - (val/250000)*250 -->

  <!-- turns:  10,   25,   50,  100,  150,  200,  250,  300,  350,  387 -->
  <!-- reads: 24708,35984,42190,67184,83811,108116,141473,180291,201772,226411 -->

  <!-- x coords: 10→86, 25→109, 50→147, 100→225, 150→302, 200→380, 250→457, 300→535, 350→612, 387→670 -->
  <!-- y coords: 24708→295, 35984→284, 42190→278, 67184→253, 83811→236, 108116→212, 141473→179, 180291→140, 201772→118, 226411→94 -->

  <!-- Area fill under curve -->
  <path d="M86,295 C98,290 120,286 147,278 C186,266 206,259 225,253 C264,241 283,238 302,236 C341,232 360,222 380,212 C418,196 437,187 457,179 C496,161 515,149 535,140 C574,122 593,110 612,118 C632,126 651,110 670,94 L670,320 L86,320 Z" fill="#1D9E75" opacity="0.1"/>

  <!-- Line -->
  <polyline points="86,295 109,284 147,278 225,253 302,236 380,212 457,179 535,140 612,118 670,94" fill="none" stroke="#1D9E75" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Expansion event vertical lines (turns: 1,56,78,142,165,194,204,209,219,225,244,292,357,363,376) -->
  <!-- map to x: 1→72, 56→157, 78→191, 142→290, 165→325, 194→371, 204→386, 209→393, 219→409, 225→419, 244→448, 292→522, 357→623, 363→633, 376→653 -->
  <line x1="72" y1="320" x2="72" y2="70" stroke="#ea580c" stroke-width="0.75" stroke-dasharray="2 3" opacity="0.35"/>
  <line x1="157" y1="320" x2="157" y2="70" stroke="#ea580c" stroke-width="0.75" stroke-dasharray="2 3" opacity="0.35"/>
  <line x1="191" y1="320" x2="191" y2="70" stroke="#ea580c" stroke-width="0.75" stroke-dasharray="2 3" opacity="0.35"/>
  <line x1="290" y1="320" x2="290" y2="70" stroke="#ea580c" stroke-width="0.75" stroke-dasharray="2 3" opacity="0.35"/>
  <line x1="325" y1="320" x2="325" y2="70" stroke="#ea580c" stroke-width="0.75" stroke-dasharray="2 3" opacity="0.35"/>
  <line x1="371" y1="320" x2="371" y2="70" stroke="#ea580c" stroke-width="0.75" stroke-dasharray="2 3" opacity="0.35"/>
  <line x1="386" y1="320" x2="386" y2="70" stroke="#ea580c" stroke-width="0.75" stroke-dasharray="2 3" opacity="0.35"/>
  <line x1="393" y1="320" x2="393" y2="70" stroke="#ea580c" stroke-width="0.75" stroke-dasharray="2 3" opacity="0.35"/>
  <line x1="409" y1="320" x2="409" y2="70" stroke="#ea580c" stroke-width="0.75" stroke-dasharray="2 3" opacity="0.35"/>
  <line x1="419" y1="320" x2="419" y2="70" stroke="#ea580c" stroke-width="0.75" stroke-dasharray="2 3" opacity="0.35"/>
  <line x1="448" y1="320" x2="448" y2="70" stroke="#ea580c" stroke-width="0.75" stroke-dasharray="2 3" opacity="0.35"/>
  <line x1="522" y1="320" x2="522" y2="70" stroke="#ea580c" stroke-width="0.75" stroke-dasharray="2 3" opacity="0.35"/>
  <line x1="623" y1="320" x2="623" y2="70" stroke="#ea580c" stroke-width="0.75" stroke-dasharray="2 3" opacity="0.35"/>
  <line x1="633" y1="320" x2="633" y2="70" stroke="#ea580c" stroke-width="0.75" stroke-dasharray="2 3" opacity="0.35"/>
  <line x1="653" y1="320" x2="653" y2="70" stroke="#ea580c" stroke-width="0.75" stroke-dasharray="2 3" opacity="0.35"/>

  <!-- Data point dots (teal) -->
  <circle cx="86" cy="295" r="5" fill="#1D9E75" stroke="#fafaf9" stroke-width="2"/>
  <circle cx="109" cy="284" r="5" fill="#1D9E75" stroke="#fafaf9" stroke-width="2"/>
  <circle cx="147" cy="278" r="5" fill="#1D9E75" stroke="#fafaf9" stroke-width="2"/>
  <circle cx="225" cy="253" r="5" fill="#1D9E75" stroke="#fafaf9" stroke-width="2"/>
  <circle cx="302" cy="236" r="5" fill="#1D9E75" stroke="#fafaf9" stroke-width="2"/>
  <circle cx="380" cy="212" r="5" fill="#1D9E75" stroke="#fafaf9" stroke-width="2"/>

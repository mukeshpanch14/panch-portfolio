  <circle cx="535" cy="140" r="5" fill="#1D9E75" stroke="#fafaf9" stroke-width="2"/>
  <circle cx="612" cy="118" r="5" fill="#ea580c" stroke="#fafaf9" stroke-width="2"/>
  <circle cx="670" cy="94" r="5" fill="#1D9E75" stroke="#fafaf9" stroke-width="2"/>

  <!-- X axis labels -->
  <text x="86" y="336" text-anchor="middle" font-size="10" fill="#73726c">10</text>
  <text x="147" y="336" text-anchor="middle" font-size="10" fill="#73726c">50</text>
  <text x="225" y="336" text-anchor="middle" font-size="10" fill="#73726c">100</text>
  <text x="302" y="336" text-anchor="middle" font-size="10" fill="#73726c">150</text>
  <text x="380" y="336" text-anchor="middle" font-size="10" fill="#73726c">200</text>
  <text x="457" y="336" text-anchor="middle" font-size="10" fill="#73726c">250</text>
  <text x="535" y="336" text-anchor="middle" font-size="10" fill="#73726c">300</text>
  <text x="612" y="336" text-anchor="middle" font-size="10" fill="#73726c">350</text>
  <text x="670" y="336" text-anchor="middle" font-size="10" fill="#73726c">387</text>
  <text x="370" y="352" text-anchor="middle" font-size="11" fill="#73726c">Turn number</text>

  <!-- Callout: context grew 10x -->
  <rect x="430" y="148" width="196" height="38" rx="6" fill="#fef9ee" stroke="#d97706" stroke-width="1"/>
  <text x="528" y="163" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">Context grew 21K → 223K tokens</text>
  <text x="528" y="178" text-anchor="middle" font-size="10" fill="#b45309">15 expansion events across 7h 50m</text>
  <line x1="430" y1="167" x2="408" y2="167" stroke="#d97706" stroke-width="1" marker-end="url(#arr2)"/>

  <!-- Legend -->
  <circle cx="84" cy="372" r="5" fill="#1D9E75"/>
  <text x="95" y="376" font-size="10" fill="#73726c">Cache reads/turn (measured)</text>
  <line x1="240" y1="372" x2="260" y2="372" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="2 3" opacity="0.7"/>
  <text x="265" y="376" font-size="10" fill="#73726c">Context expansion event (file read)</text>
  <rect x="460" y="366" width="10" height="10" rx="2" fill="#1D9E75" opacity="0.15" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="476" y="376" font-size="10" fill="#73726c">Area under curve = total cache reads</text>

  <defs>
    <marker id="arr2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#d97706" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>


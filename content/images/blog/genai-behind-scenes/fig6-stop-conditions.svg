<svg width="100%" viewBox="0 0 700 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Start -->
  <rect x="280" y="16" width="140" height="40" rx="8" fill="#EFE9DF" stroke="#D1CAC0" stroke-width="1.5"/>
  <text x="350" y="41" text-anchor="middle" font-size="13" font-weight="600" fill="#1C1A16" font-family="DM Sans, system-ui, sans-serif">Generating…</text>

  <!-- Arrow down -->
  <line x1="350" y1="58" x2="350" y2="78" stroke="#D1CAC0" stroke-width="1.5" marker-end="url(#arr3)"/>

  <!-- Decision diamond -->
  <polygon points="350,80 430,115 350,150 270,115" fill="#F7F3EC" stroke="#D1CAC0" stroke-width="1.5"/>
  <text x="350" y="111" text-anchor="middle" font-size="11" fill="#6B6456" font-family="DM Sans, system-ui, sans-serif">Check stop</text>
  <text x="350" y="125" text-anchor="middle" font-size="11" fill="#6B6456" font-family="DM Sans, system-ui, sans-serif">condition?</text>

  <!-- Three branches -->
  <!-- Left: max tokens -->
  <line x1="270" y1="115" x2="110" y2="115" stroke="#E8593C" stroke-width="1.5" marker-end="url(#arr3)"/>
  <text x="190" y="107" text-anchor="middle" font-size="10" fill="#E8593C" font-family="DM Sans, system-ui, sans-serif">token count</text>
  <rect x="20" y="92" width="88" height="46" rx="8" fill="#FEF2EE" stroke="#F0C0AC" stroke-width="1.5"/>
  <text x="64" y="113" text-anchor="middle" font-size="11" font-weight="600" fill="#922A10" font-family="DM Sans, system-ui, sans-serif">Max tokens</text>
  <text x="64" y="128" text-anchor="middle" font-size="10" fill="#922A10" font-family="DM Sans, system-ui, sans-serif">reached</text>

  <!-- Right: stop sequence -->
  <line x1="430" y1="115" x2="590" y2="115" stroke="#C4A020" stroke-width="1.5" marker-end="url(#arr3)"/>
  <text x="510" y="107" text-anchor="middle" font-size="10" fill="#C4A020" font-family="DM Sans, system-ui, sans-serif">matched text</text>
  <rect x="592" y="92" width="90" height="46" rx="8" fill="#FBF5E6" stroke="#E8D08A" stroke-width="1.5"/>
  <text x="637" y="113" text-anchor="middle" font-size="11" font-weight="600" fill="#7A5A10" font-family="DM Sans, system-ui, sans-serif">Stop</text>
  <text x="637" y="128" text-anchor="middle" font-size="11" font-weight="600" fill="#7A5A10" font-family="DM Sans, system-ui, sans-serif">sequence</text>

  <!-- Bottom: EOS -->
  <line x1="350" y1="150" x2="350" y2="175" stroke="#2D6A4F" stroke-width="1.5" marker-end="url(#arr3)"/>
  <text x="366" y="168" font-size="10" fill="#2D6A4F" font-family="DM Sans, system-ui, sans-serif">EOS token</text>
  <rect x="280" y="177" width="140" height="16" rx="6" fill="#EBF6F0" stroke="#A6D9C0" stroke-width="1.5"/>
  <text x="350" y="189" text-anchor="middle" font-size="11" font-weight="600" fill="#1C5C3A" font-family="DM Sans, system-ui, sans-serif">Natural ending ✓</text>
</svg>

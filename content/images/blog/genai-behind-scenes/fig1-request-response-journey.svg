<svg width="100%" viewBox="0 0 700 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- User Device -->
  <rect x="10" y="50" width="120" height="60" rx="10" fill="#EFE9DF" stroke="#C1440E" stroke-width="1.5"/>
  <text x="70" y="76" text-anchor="middle" font-size="13" font-weight="600" fill="#1C1A16" font-family="DM Sans, system-ui, sans-serif">Your App</text>
  <text x="70" y="94" text-anchor="middle" font-size="11" fill="#6B6456" font-family="DM Sans, system-ui, sans-serif">Web / Mobile</text>

  <!-- Arrow 1 -->
  <line x1="132" y1="73" x2="188" y2="73" stroke="#C1440E" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="4 3"/>
  <text x="160" y="66" text-anchor="middle" font-size="10" fill="#C1440E" font-family="DM Sans, system-ui, sans-serif">HTTPS</text>

  <!-- App Server -->
  <rect x="190" y="50" width="130" height="60" rx="10" fill="#EFE9DF" stroke="#2D6A4F" stroke-width="1.5"/>
  <text x="255" y="76" text-anchor="middle" font-size="13" font-weight="600" fill="#1C1A16" font-family="DM Sans, system-ui, sans-serif">Your Server</text>
  <text x="255" y="94" text-anchor="middle" font-size="11" fill="#6B6456" font-family="DM Sans, system-ui, sans-serif">Node / Python / etc.</text>

  <!-- Arrow 2 -->
  <line x1="322" y1="73" x2="378" y2="73" stroke="#2D6A4F" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="4 3"/>
  <text x="350" y="66" text-anchor="middle" font-size="10" fill="#2D6A4F" font-family="DM Sans, system-ui, sans-serif">API call</text>

  <!-- AI API -->
  <rect x="380" y="50" width="130" height="60" rx="10" fill="#EFE9DF" stroke="#7857BE" stroke-width="1.5"/>
  <text x="445" y="76" text-anchor="middle" font-size="13" font-weight="600" fill="#1C1A16" font-family="DM Sans, system-ui, sans-serif">AI Provider</text>
  <text x="445" y="94" text-anchor="middle" font-size="11" fill="#6B6456" font-family="DM Sans, system-ui, sans-serif">Anthropic / OpenAI…</text>

  <!-- Arrow 3 -->
  <line x1="512" y1="73" x2="568" y2="73" stroke="#7857BE" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="4 3"/>
  <text x="540" y="66" text-anchor="middle" font-size="10" fill="#7857BE" font-family="DM Sans, system-ui, sans-serif">inference</text>

  <!-- Model -->
  <rect x="570" y="50" width="120" height="60" rx="10" fill="#F2DDD4" stroke="#C1440E" stroke-width="1.5"/>
  <text x="630" y="76" text-anchor="middle" font-size="13" font-weight="600" fill="#1C1A16" font-family="DM Sans, system-ui, sans-serif">LLM Model</text>
  <text x="630" y="94" text-anchor="middle" font-size="11" fill="#C1440E" font-family="DM Sans, system-ui, sans-serif">Claude / GPT / Gemini</text>

  <!-- Return path label -->
  <text x="350" y="140" text-anchor="middle" font-size="11" fill="#6B6456" font-family="DM Sans, system-ui, sans-serif">↩ Response travels back through the same path</text>
</svg>

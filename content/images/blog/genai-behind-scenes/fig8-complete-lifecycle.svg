<svg width="100%" viewBox="0 0 700 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr4" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Step 1 -->
  <rect x="40" y="20" width="260" height="40" rx="8" fill="#EFE9DF" stroke="#C1440E" stroke-width="1.5"/>
  <text x="60" y="38" font-size="11" font-weight="600" fill="#C1440E" font-family="DM Sans, system-ui, sans-serif">① User sends message</text>
  <text x="60" y="53" font-size="11" fill="#6B6456" font-family="DM Sans, system-ui, sans-serif">"What is quantum computing?"</text>

  <!-- Step 2 -->
  <line x1="170" y1="62" x2="170" y2="82" stroke="#D1CAC0" stroke-width="1.5" marker-end="url(#arr4)"/>
  <rect x="40" y="84" width="260" height="40" rx="8" fill="#EFE9DF" stroke="#2D6A4F" stroke-width="1.5"/>
  <text x="60" y="102" font-size="11" font-weight="600" fill="#2D6A4F" font-family="DM Sans, system-ui, sans-serif">② Server builds API request</text>
  <text x="60" y="117" font-size="11" fill="#6B6456" font-family="DM Sans, system-ui, sans-serif">Adds API key, model, message history</text>

  <!-- Step 3 -->
  <line x1="170" y1="126" x2="170" y2="146" stroke="#D1CAC0" stroke-width="1.5" marker-end="url(#arr4)"/>
  <rect x="40" y="148" width="260" height="40" rx="8" fill="#F0ECF8" stroke="#7857BE" stroke-width="1.5"/>
  <text x="60" y="166" font-size="11" font-weight="600" fill="#5438A0" font-family="DM Sans, system-ui, sans-serif">③ Tokenization</text>
  <text x="60" y="181" font-size="11" fill="#6B6456" font-family="DM Sans, system-ui, sans-serif">Text → [What] [is] [quantum] [computing] [?]</text>

  <!-- Step 4 -->
  <line x1="170" y1="190" x2="170" y2="210" stroke="#D1CAC0" stroke-width="1.5" marker-end="url(#arr4)"/>
  <rect x="40" y="212" width="260" height="40" rx="8" fill="#EBF6F0" stroke="#2D6A4F" stroke-width="1.5"/>
  <text x="60" y="230" font-size="11" font-weight="600" fill="#1C5C3A" font-family="DM Sans, system-ui, sans-serif">④ Embedding + Contextualization</text>
  <text x="60" y="245" font-size="11" fill="#6B6456" font-family="DM Sans, system-ui, sans-serif">Tokens → vectors → meaning understood</text>

  <!-- Step 5 -->
  <line x1="170" y1="254" x2="170" y2="274" stroke="#D1CAC0" stroke-width="1.5" marker-end="url(#arr4)"/>
  <rect x="40" y="276" width="260" height="40" rx="8" fill="#F2DDD4" stroke="#C1440E" stroke-width="1.5"/>
  <text x="60" y="294" font-size="11" font-weight="600" fill="#922A10" font-family="DM Sans, system-ui, sans-serif">⑤ Generation → Stop</text>
  <text x="60" y="309" font-size="11" fill="#6B6456" font-family="DM Sans, system-ui, sans-serif">Tokens generated one by one until EOS</text>

  <!-- Divider -->
  <line x1="340" y1="20" x2="340" y2="320" stroke="#D1CAC0" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Right side response -->
  <rect x="380" y="20" width="280" height="40" rx="8" fill="#EFE9DF" stroke="#C1440E" stroke-width="1.5"/>
  <text x="400" y="38" font-size="11" font-weight="600" fill="#C1440E" font-family="DM Sans, system-ui, sans-serif">⑨ App displays reply</text>
  <text x="400" y="53" font-size="11" fill="#6B6456" font-family="DM Sans, system-ui, sans-serif">"Quantum computing is…"</text>

  <line x1="520" y1="62" x2="520" y2="82" stroke="#D1CAC0" stroke-width="1.5" marker-end="url(#arr4)"/>
  <rect x="380" y="84" width="280" height="40" rx="8" fill="#EFE9DF" stroke="#2D6A4F" stroke-width="1.5"/>
  <text x="400" y="102" font-size="11" font-weight="600" fill="#2D6A4F" font-family="DM Sans, system-ui, sans-serif">⑧ Server extracts content</text>
  <text x="400" y="117" font-size="11" fill="#6B6456" font-family="DM Sans, system-ui, sans-serif">Reads response.content[0].text</text>

  <line x1="520" y1="126" x2="520" y2="146" stroke="#D1CAC0" stroke-width="1.5" marker-end="url(#arr4)"/>
  <rect x="380" y="148" width="280" height="60" rx="8" fill="#FBF5E6" stroke="#E8D08A" stroke-width="1.5"/>
  <text x="400" y="166" font-size="11" font-weight="600" fill="#7A5A10" font-family="DM Sans, system-ui, sans-serif">⑦ Response object arrives</text>
  <text x="400" y="181" font-size="11" fill="#6B6456" font-family="DM Sans, system-ui, sans-serif">content: "Quantum computing…"</text>
  <text x="400" y="196" font-size="11" fill="#6B6456" font-family="DM Sans, system-ui, sans-serif">usage: {in: 42, out: 285} · stop: "end_turn"</text>

  <line x1="520" y1="210" x2="520" y2="230" stroke="#D1CAC0" stroke-width="1.5" marker-end="url(#arr4)"/>
  <rect x="380" y="232" width="280" height="64" rx="8" fill="#F0ECF8" stroke="#C8B8EA" stroke-width="1.5"/>
  <text x="400" y="250" font-size="11" font-weight="600" fill="#5438A0" font-family="DM Sans, system-ui, sans-serif">⑥ AI generates response tokens</text>
  <text x="400" y="265" font-size="11" fill="#6B6456" font-family="DM Sans, system-ui, sans-serif">[Quantum][computing][is][a][form]</text>
  <text x="400" y="280" font-size="11" fill="#6B6456" font-family="DM Sans, system-ui, sans-serif">[of][ computing.][EOS] ✓</text>
</svg>

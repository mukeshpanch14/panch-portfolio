<svg width="100%" viewBox="0 0 680 540" xmlns="http://www.w3.org/2000/svg" style="display:block;">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Step 1: User presses paste -->
  <rect x="40" y="40" width="160" height="56" rx="8" fill="#e8e4dc" stroke="#b0aea8" stroke-width="0.8"/>
  <text x="120" y="62" text-anchor="middle" dominant-baseline="central" font-family="'Geist',system-ui,sans-serif" font-size="13" font-weight="500" fill="#1a1814">User presses Ctrl+V</text>
  <text x="120" y="82" text-anchor="middle" dominant-baseline="central" font-family="'Geist',system-ui,sans-serif" font-size="11" fill="#6b6760">paste shortcut fires</text>

  <!-- Arrow 1→2 -->
  <line x1="120" y1="96" x2="120" y2="134" stroke="#b0aea8" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="134" y="118" dominant-baseline="central" font-family="'DM Mono',monospace" font-size="10" fill="#6b6760">intercepted by</text>

  <!-- Step 2: Claude Code TUI -->
  <rect x="40" y="134" width="160" height="56" rx="8" fill="#e8e3f7" stroke="#5a3db8" stroke-width="0.8"/>
  <text x="120" y="156" text-anchor="middle" dominant-baseline="central" font-family="'Geist',system-ui,sans-serif" font-size="13" font-weight="500" fill="#3a2580">Claude Code</text>
  <text x="120" y="174" text-anchor="middle" dominant-baseline="central" font-family="'Geist',system-ui,sans-serif" font-size="11" fill="#5a3db8">input handler (TUI)</text>

  <!-- Terminal bypassed (dashed, faded) -->
  <rect x="240" y="134" width="140" height="56" rx="8" fill="#f5f3ee" stroke="#b0aea8" stroke-width="0.8" stroke-dasharray="4 3" opacity="0.6"/>
  <text x="310" y="156" text-anchor="middle" dominant-baseline="central" font-family="'Geist',system-ui,sans-serif" font-size="13" font-weight="500" fill="#b0aea8">Terminal</text>
  <text x="310" y="174" text-anchor="middle" dominant-baseline="central" font-family="'Geist',system-ui,sans-serif" font-size="11" fill="#b0aea8">bypassed entirely</text>
  <line x1="200" y1="162" x2="238" y2="162" stroke="#b0aea8" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arr)" opacity="0.5"/>
  <text x="219" y="154" text-anchor="middle" font-family="'DM Mono',monospace" font-size="10" fill="#b0aea8">skip</text>

  <!-- Arrow 2→3 -->
  <line x1="120" y1="190" x2="120" y2="228" stroke="#b0aea8" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="134" y="212" dominant-baseline="central" font-family="'DM Mono',monospace" font-size="10" fill="#6b6760">OS clipboard API</text>

  <!-- Step 3: OS clipboard read -->
  <rect x="40" y="228" width="160" height="56" rx="8" fill="#d0ede9" stroke="#1a7a6e" stroke-width="0.8"/>
  <text x="120" y="250" text-anchor="middle" dominant-baseline="central" font-family="'Geist',system-ui,sans-serif" font-size="13" font-weight="500" fill="#0d5248">OS clipboard read</text>
  <text x="120" y="268" text-anchor="middle" dominant-baseline="central" font-family="'Geist',system-ui,sans-serif" font-size="11" fill="#1a7a6e">raw image bytes</text>

  <!-- Arrow 3→4 -->
  <line x1="120" y1="284" x2="120" y2="322" stroke="#b0aea8" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="134" y="306" dominant-baseline="central" font-family="'DM Mono',monospace" font-size="10" fill="#6b6760">encode in memory</text>

  <!-- Step 4: Base64 encode -->
  <rect x="40" y="322" width="160" height="56" rx="8" fill="#d0ede9" stroke="#1a7a6e" stroke-width="0.8"/>
  <text x="120" y="344" text-anchor="middle" dominant-baseline="central" font-family="'Geist',system-ui,sans-serif" font-size="13" font-weight="500" fill="#0d5248">Base64 encode</text>
  <text x="120" y="362" text-anchor="middle" dominant-baseline="central" font-family="'Geist',system-ui,sans-serif" font-size="11" fill="#1a7a6e">image → string</text>

  <!-- Arrow 4→5 -->
  <line x1="120" y1="378" x2="120" y2="416" stroke="#b0aea8" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="134" y="400" dominant-baseline="central" font-family="'DM Mono',monospace" font-size="10" fill="#6b6760">bundled in JSON</text>

  <!-- Step 5: API call -->
  <rect x="40" y="416" width="160" height="56" rx="8" fill="#f2ddd3" stroke="#c8501a" stroke-width="0.8"/>
  <text x="120" y="438" text-anchor="middle" dominant-baseline="central" font-family="'Geist',system-ui,sans-serif" font-size="13" font-weight="500" fill="#7a2e0a">Anthropic API</text>
  <text x="120" y="456" text-anchor="middle" dominant-baseline="central" font-family="'Geist',system-ui,sans-serif" font-size="11" fill="#c8501a">/v1/messages call</text>

  <!-- Right panel: API payload -->
  <rect x="420" y="40" width="228" height="460" rx="12" fill="#ffffff" stroke="#d8d4cc" stroke-width="0.8"/>
  <text x="534" y="68" text-anchor="middle" dominant-baseline="central" font-family="'Geist',system-ui,sans-serif" font-size="13" font-weight="500" fill="#1a1814">API payload structure</text>
  <line x1="436" y1="82" x2="632" y2="82" stroke="#e8e4dc" stroke-width="0.8"/>

  <!-- JSON content -->
  <text x="438" y="106" font-family="'DM Mono',monospace" font-size="11" fill="#6b6760">{</text>
  <text x="448" y="124" font-family="'DM Mono',monospace" font-size="11" fill="#c8a96e">"role"</text><text x="498" y="124" font-family="'DM Mono',monospace" font-size="11" fill="#6b6760">: </text><text x="510" y="124" font-family="'DM Mono',monospace" font-size="11" fill="#8ec07c">"user"</text><text x="553" y="124" font-family="'DM Mono',monospace" font-size="11" fill="#6b6760">,</text>
  <text x="448" y="142" font-family="'DM Mono',monospace" font-size="11" fill="#c8a96e">"content"</text><text x="512" y="142" font-family="'DM Mono',monospace" font-size="11" fill="#6b6760">: [</text>

  <!-- Image block highlight box -->
  <rect x="452" y="152" width="184" height="126" rx="6" fill="#f5f3ee" stroke="#c8501a" stroke-width="0.6"/>
  <text x="462" y="170" font-family="'DM Mono',monospace" font-size="11" fill="#6b6760">{</text>
  <text x="470" y="188" font-family="'DM Mono',monospace" font-size="11" fill="#c8a96e">"type"</text><text x="509" y="188" font-family="'DM Mono',monospace" font-size="11" fill="#6b6760">:</text><text x="518" y="188" font-family="'DM Mono',monospace" font-size="11" fill="#8ec07c">"image"</text><text x="568" y="188" font-family="'DM Mono',monospace" font-size="11" fill="#6b6760">,</text>
  <text x="470" y="206" font-family="'DM Mono',monospace" font-size="11" fill="#c8a96e">"source"</text><text x="519" y="206" font-family="'DM Mono',monospace" font-size="11" fill="#6b6760">: {</text>
  <text x="480" y="222" font-family="'DM Mono',monospace" font-size="11" fill="#c8a96e">"type"</text><text x="519" y="222" font-family="'DM Mono',monospace" font-size="11" fill="#6b6760">:</text><text x="528" y="222" font-family="'DM Mono',monospace" font-size="11" fill="#8ec07c">"base64"</text>
  <text x="480" y="240" font-family="'DM Mono',monospace" font-size="11" fill="#c8a96e">"data"</text><text x="518" y="240" font-family="'DM Mono',monospace" font-size="11" fill="#6b6760">:</text><text x="527" y="240" font-family="'DM Mono',monospace" font-size="11" fill="#8ec07c">"iVBOR..."</text>
  <text x="470" y="258" font-family="'DM Mono',monospace" font-size="11" fill="#6b6760">}</text>
  <text x="462" y="272" font-family="'DM Mono',monospace" font-size="11" fill="#6b6760">}</text>

  <text x="448" y="295" font-family="'DM Mono',monospace" font-size="11" fill="#6b6760">{</text>
  <text x="456" y="313" font-family="'DM Mono',monospace" font-size="11" fill="#c8a96e">"type"</text><text x="495" y="313" font-family="'DM Mono',monospace" font-size="11" fill="#6b6760">:</text><text x="504" y="313" font-family="'DM Mono',monospace" font-size="11" fill="#8ec07c">"text"</text>
  <text x="456" y="331" font-family="'DM Mono',monospace" font-size="11" fill="#c8a96e">"text"</text><text x="493" y="331" font-family="'DM Mono',monospace" font-size="11" fill="#6b6760">:</text><text x="502" y="331" font-family="'DM Mono',monospace" font-size="11" fill="#8ec07c">"prompt"</text>
  <text x="448" y="349" font-family="'DM Mono',monospace" font-size="11" fill="#6b6760">}</text>
  <text x="438" y="367" font-family="'DM Mono',monospace" font-size="11" fill="#6b6760">]</text>
  <text x="438" y="385" font-family="'DM Mono',monospace" font-size="11" fill="#6b6760">}</text>

  <!-- Token note -->
  <rect x="432" y="408" width="200" height="52" rx="8" fill="#fdf0eb" stroke="#c8501a" stroke-width="0.6"/>
  <text x="532" y="428" text-anchor="middle" dominant-baseline="central" font-family="'Geist',system-ui,sans-serif" font-size="12" fill="#7a2e0a">1000×1000 px image</text>
  <text x="532" y="446" text-anchor="middle" dominant-baseline="central" font-family="'Geist',system-ui,sans-serif" font-size="12" fill="#c8501a">≈ 1,334 tokens</text>

  <!-- Dashed connector from step 4 to right panel -->
  <path d="M200 350 L420 350" fill="none" stroke="#b0aea8" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr)"/>

  <!-- What you see label -->
  <rect x="240" y="40" width="140" height="56" rx="8" fill="#e6f1fb" stroke="#185fa5" stroke-width="0.8"/>
  <text x="310" y="61" text-anchor="middle" dominant-baseline="central" font-family="'Geist',system-ui,sans-serif" font-size="12" font-weight="500" fill="#0c447c">What you see</text>
  <text x="310" y="79" text-anchor="middle" dominant-baseline="central" font-family="'Geist',system-ui,sans-serif" font-size="11" fill="#185fa5">word "image" in input</text>
  <line x1="200" y1="68" x2="238" y2="68" stroke="#185fa5" stroke-width="1" marker-end="url(#arr)" opacity="0.7"/>
</svg>

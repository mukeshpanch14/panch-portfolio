<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>CMS Login</title>
    <style>
      body { font-family: sans-serif; display: flex; justify-content: center;
             align-items: center; min-height: 100vh; margin: 0; background: #f5f5f5; }
      .card { background: white; border-radius: 8px; padding: 2rem;
              box-shadow: 0 2px 8px rgba(0,0,0,.15); width: 320px; }
      h1 { font-size: 1.25rem; margin: 0 0 1.5rem; text-align: center; }
      .btn { display: block; width: 100%; padding: .75rem; margin-bottom: .75rem;
             border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
      .btn-github { background: #24292e; color: white; }
      .divider { text-align: center; color: #999; margin: 1rem 0; font-size: .875rem; }
      input[type=password] { width: 100%; padding: .6rem; box-sizing: border-box;
                              border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; }
      .btn-password { background: #555; color: white; margin-top: .5rem; }
      #msg { margin-top: .75rem; text-align: center; font-size: .875rem; color: red; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Content Manager</h1>

      <button class="btn btn-github" id="github-btn">Login with GitHub</button>

      <div class="divider">or</div>

      <input type="password" id="pw" placeholder="Password" />
      <button class="btn btn-password" id="pw-btn">Login with Password</button>
      <div id="msg"></div>
    </div>

    <script>
      const WORKER = 'https://panch-cms-auth.mukesh-panch14.workers.dev';

      document.getElementById('github-btn').addEventListener('click', async () => {
        const cfg = await fetch('config.yml').then(r => r.text());
        const match = cfg.match(/app_id:\s*(\S+)/);
        if (!match) { alert('Could not read app_id from config.yml'); return; }
        const params = new URLSearchParams({
          client_id: match[1],
          redirect_uri: 'https://panchmukesh.in/admin/cms.html',
          response_type: 'token',
          scope: 'repo',
        });
        location.href = `https://github.com/login/oauth/authorize?${params}`;
      });

      document.getElementById('pw-btn').addEventListener('click', async () => {
        const pw = document.getElementById('pw').value;
        const msg = document.getElementById('msg');
        msg.textContent = '';
        try {
          const res = await fetch(`${WORKER}/token?password=${encodeURIComponent(pw)}`);
          if (!res.ok) { msg.textContent = 'Wrong password.'; return; }
          const { token } = await res.json();
          location.href = `cms.html#access_token=${token}&token_type=bearer`;
        } catch (e) {
          msg.textContent = 'Network error. Try again.';
        }
      });
    </script>
  </body>
</html>
